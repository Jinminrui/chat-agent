schema: spec-driven

context: |
  项目名称：chat-agent
  目标：构建前后端分离的网页聊天 agent，支持账号密码登录、历史会话、SSE 流式聊天与内置工具调用。

  技术栈：
  - Monorepo：pnpm workspace
  - 前端：Next.js 15、React 19、TypeScript、Tailwind CSS、shadcn/ui
  - 后端：Fastify 5、TypeScript
  - 数据库：PostgreSQL、Prisma
  - 测试：Vitest、Testing Library

  目录约定：
  - apps/web：前端应用
  - apps/backend：后端应用
  - packages/shared：共享类型与契约
  - prisma：数据库 schema 与迁移

  协作约定：
  - 始终使用中文编写说明、spec 与任务文档。
  - 优先做最小可行改动，不添加与当前目标无关的功能、抽象或重构。
  - 修改方案需要与现有代码风格和目录结构保持一致。
  - 如果需求存在多种解释，先在 proposal 或 design 中明确假设与取舍。

  常用命令：
  - 安装依赖：pnpm install
  - 启动前端：pnpm dev:web
  - 启动后端：pnpm dev:backend
  - 运行全部测试：pnpm test
  - 运行前端测试：pnpm --filter web test
  - 运行后端测试：pnpm --filter backend test
  - 数据库迁移：pnpm --filter backend exec prisma migrate dev

rules:
  proposal:
    - 聚焦“要解决的问题、目标范围、非目标、影响面”，避免展开实现细节。
    - 如果存在前端、后端、数据库或共享契约影响，明确列出受影响模块。
    - 如果有不确定项，写清楚假设，不要省略。
  design:
    - 只描述完成当前目标所需的实现方案，避免猜测性扩展。
    - 明确涉及的数据流、接口变化、存储变化与模块边界。
    - 如果方案会影响现有测试或行为，需要写出兼容性与回归风险。
  tasks:
    - 任务按可验证的小步拆分，每项都应能直接映射到代码或测试结果。
    - 优先先写验证步骤，再写实现步骤；若不适合先测，也要说明验证方式。
    - 不要把无关优化、重构或清理混入当前任务。
